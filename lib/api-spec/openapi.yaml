openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Traveloop API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: trips
    description: Trip management
  - name: stops
    description: Trip stops / cities
  - name: activities
    description: Stop activities
  - name: cities
    description: City search
  - name: activityCatalog
    description: Activity catalog
  - name: packing
    description: Packing checklist
  - name: notes
    description: Trip notes
  - name: budget
    description: Budget breakdown
  - name: profile
    description: User profile
  - name: dashboard
    description: Dashboard summary
  - name: admin
    description: Admin analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Dashboard
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # Trips
  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all trips for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip by ID
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trips/{tripId}/share:
    patch:
      operationId: toggleTripShare
      tags: [trips]
      summary: Toggle trip public/private sharing
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripShareToggle"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/public/{shareCode}:
    get:
      operationId: getPublicTrip
      tags: [trips]
      summary: Get a publicly shared trip by share code
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Stops
  /trips/{tripId}/stops:
    get:
      operationId: listStops
      tags: [stops]
      summary: List stops for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stop"
    post:
      operationId: createStop
      tags: [stops]
      summary: Add a stop to a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stop"

  /trips/{tripId}/stops/reorder:
    put:
      operationId: reorderStops
      tags: [stops]
      summary: Reorder stops in a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopReorder"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trips/{tripId}/stops/{stopId}:
    patch:
      operationId: updateStop
      tags: [stops]
      summary: Update a stop
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stop"
    delete:
      operationId: deleteStop
      tags: [stops]
      summary: Remove a stop from a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Activities on a stop
  /stops/{stopId}/activities:
    get:
      operationId: listStopActivities
      tags: [activities]
      summary: List activities for a stop
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StopActivity"
    post:
      operationId: addStopActivity
      tags: [activities]
      summary: Add an activity to a stop
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopActivity"

  /stops/{stopId}/activities/{activityId}:
    delete:
      operationId: removeStopActivity
      tags: [activities]
      summary: Remove an activity from a stop
      parameters:
        - name: stopId
          in: path
          required: true
          schema:
            type: integer
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # City search
  /cities:
    get:
      operationId: searchCities
      tags: [cities]
      summary: Search cities
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  # Activity catalog search
  /activity-catalog:
    get:
      operationId: searchActivityCatalog
      tags: [activityCatalog]
      summary: Search activity catalog
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: cityId
          in: query
          schema:
            type: integer
        - name: maxCost
          in: query
          schema:
            type: number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityCatalogItem"

  # Budget
  /trips/{tripId}/budget:
    get:
      operationId: getTripBudget
      tags: [budget]
      summary: Get budget breakdown for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetBreakdown"

  # Packing
  /trips/{tripId}/packing:
    get:
      operationId: listPackingItems
      tags: [packing]
      summary: List packing items for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PackingItem"
    post:
      operationId: createPackingItem
      tags: [packing]
      summary: Add a packing item
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackingItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingItem"

  /trips/{tripId}/packing/{itemId}:
    patch:
      operationId: updatePackingItem
      tags: [packing]
      summary: Update a packing item (toggle packed, rename, etc.)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackingItemUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingItem"
    delete:
      operationId: deletePackingItem
      tags: [packing]
      summary: Delete a packing item
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Notes
  /trips/{tripId}/notes:
    get:
      operationId: listTripNotes
      tags: [notes]
      summary: List notes for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripNote"
    post:
      operationId: createTripNote
      tags: [notes]
      summary: Create a note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripNote"

  /trips/{tripId}/notes/{noteId}:
    patch:
      operationId: updateTripNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripNoteUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripNote"
    delete:
      operationId: deleteTripNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Profile
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteAccount
      tags: [profile]
      summary: Delete account
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Admin
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform analytics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AuthInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        photo:
          type: ["string", "null"]
        language:
          type: string
        savedDestinations:
          type: array
          items:
            type: string
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        photo:
          type: string
        language:
          type: string
        savedDestinations:
          type: array
          items:
            type: string

    Trip:
      type: object
      required: [id, userId, name, startDate, endDate, createdAt, isPublic, stopCount]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        coverPhoto:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        isPublic:
          type: boolean
        shareCode:
          type: ["string", "null"]
        totalBudget:
          type: ["number", "null"]
        stopCount:
          type: integer
        createdAt:
          type: string

    TripDetail:
      type: object
      required: [id, userId, name, startDate, endDate, createdAt, isPublic, stops]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        coverPhoto:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        isPublic:
          type: boolean
        shareCode:
          type: ["string", "null"]
        totalBudget:
          type: ["number", "null"]
        createdAt:
          type: string
        stops:
          type: array
          items:
            $ref: "#/components/schemas/Stop"

    TripInput:
      type: object
      required: [name, startDate, endDate]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        coverPhoto:
          type: string
        totalBudget:
          type: number

    TripUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        coverPhoto:
          type: string
        totalBudget:
          type: number

    TripShareToggle:
      type: object
      required: [isPublic]
      properties:
        isPublic:
          type: boolean

    City:
      type: object
      required: [id, name, country]
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        region:
          type: ["string", "null"]
        costIndex:
          type: ["number", "null"]
        popularity:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        description:
          type: ["string", "null"]

    Stop:
      type: object
      required: [id, tripId, cityId, cityName, country, startDate, endDate, order]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        cityId:
          type: integer
        cityName:
          type: string
        country:
          type: string
        cityImageUrl:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        order:
          type: integer
        activities:
          type: array
          items:
            $ref: "#/components/schemas/StopActivity"

    StopInput:
      type: object
      required: [cityId, startDate, endDate]
      properties:
        cityId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string

    StopUpdate:
      type: object
      properties:
        cityId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string

    StopReorder:
      type: object
      required: [order]
      properties:
        order:
          type: array
          items:
            type: integer

    ActivityCatalogItem:
      type: object
      required: [id, name, category]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]
        cost:
          type: ["number", "null"]
        duration:
          type: ["number", "null"]
        cityId:
          type: ["integer", "null"]
        cityName:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    StopActivity:
      type: object
      required: [id, stopId, name, category]
      properties:
        id:
          type: integer
        stopId:
          type: integer
        activityCatalogId:
          type: ["integer", "null"]
        name:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]
        cost:
          type: ["number", "null"]
        duration:
          type: ["number", "null"]
        scheduledTime:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    StopActivityInput:
      type: object
      required: [name, category]
      properties:
        activityCatalogId:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: string
        cost:
          type: number
        duration:
          type: number
        scheduledTime:
          type: string
        imageUrl:
          type: string

    BudgetBreakdown:
      type: object
      required: [tripId, totalEstimated, perDayAverage, stops]
      properties:
        tripId:
          type: integer
        totalBudget:
          type: ["number", "null"]
        totalEstimated:
          type: number
        perDayAverage:
          type: number
        remainingBudget:
          type: ["number", "null"]
        isOverBudget:
          type: boolean
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/BudgetCategory"
        stops:
          type: array
          items:
            $ref: "#/components/schemas/StopBudget"

    BudgetCategory:
      type: object
      required: [category, amount]
      properties:
        category:
          type: string
        amount:
          type: number

    StopBudget:
      type: object
      required: [stopId, cityName, startDate, endDate, activityCost, days]
      properties:
        stopId:
          type: integer
        cityName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        activityCost:
          type: number
        days:
          type: integer

    PackingItem:
      type: object
      required: [id, tripId, name, category, isPacked, createdAt]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        name:
          type: string
        category:
          type: string
        isPacked:
          type: boolean
        createdAt:
          type: string

    PackingItemInput:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string

    PackingItemUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        isPacked:
          type: boolean

    TripNote:
      type: object
      required: [id, tripId, content, createdAt]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        stopId:
          type: ["integer", "null"]
        content:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    TripNoteInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        stopId:
          type: integer

    TripNoteUpdate:
      type: object
      properties:
        content:
          type: string

    DashboardSummary:
      type: object
      required: [upcomingTrips, totalTrips, totalDestinations, recentTrips, popularCities]
      properties:
        upcomingTrips:
          type: integer
        totalTrips:
          type: integer
        totalDestinations:
          type: integer
        totalBudgetSpent:
          type: number
        recentTrips:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        popularCities:
          type: array
          items:
            $ref: "#/components/schemas/City"

    AdminStats:
      type: object
      required: [totalUsers, totalTrips, totalStops, topCities, recentActivity]
      properties:
        totalUsers:
          type: integer
        totalTrips:
          type: integer
        totalStops:
          type: integer
        publicTrips:
          type: integer
        topCities:
          type: array
          items:
            type: object
            required: [cityName, count]
            properties:
              cityName:
                type: string
              count:
                type: integer
        recentActivity:
          type: array
          items:
            type: object
            required: [description, createdAt]
            properties:
              description:
                type: string
              createdAt:
                type: string
