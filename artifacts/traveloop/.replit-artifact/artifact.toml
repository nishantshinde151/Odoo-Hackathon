kind = "web"
previewPath = "/"
title = "Traveloop"
version = "1.0.0"
id = "artifacts/traveloop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22872

[services.development]
run = "pnpm --filter @workspace/traveloop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traveloop", "run", "build" ]
publicDir = "artifacts/traveloop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22872"
BASE_PATH = "/"
